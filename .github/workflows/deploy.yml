# Deploy Workflow
#
# Provisions CloudStack infrastructure and deploys with Kamal.
#
# Required GitHub Secrets (infrastructure):
#   CLOUDSTACK_API_KEY    - CloudStack API key
#   CLOUDSTACK_SECRET_KEY - CloudStack secret key
#   SSH_PRIVATE_KEY       - SSH private key for VM access
#
# Required GitHub Secrets (application — set in the caller repo):
#   App secrets (POSTGRES_PASSWORD, DATABASE_URL, etc.) are GitHub Secrets
#   in the caller repo. Kamal picks them up via .kamal/secrets references.
#   The workflow exports SECRET_ENV_VARS entries as shell env vars for Kamal.
#
# Note: GITHUB_TOKEN is used for ghcr.io registry access (no separate REGISTRY_TOKEN needed).

name: Deploy

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.repository }}-${{ inputs.env_name || 'preview' }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment name (e.g. preview, staging, production)"
        required: false
        default: "preview"
      zone:
        description: "CloudStack zone"
        type: choice
        default: "ZP01"
        options:
          - ZP01
          - ZP02
      web_plan:
        description: "Web VM plan"
        type: choice
        default: "small"
        options:
          - micro
          - small
          - medium
          - large
          - xlarge
          - 2xlarge
          - 4xlarge
      web_disk_size_gb:
        description: "Web data disk size in GB"
        type: number
        default: 20
      workers_replicas:
        description: "Number of worker replicas (0 = no workers)"
        type: number
        default: 0
      workers_plan:
        description: "Worker VM plan"
        type: choice
        default: "small"
        options:
          - micro
          - small
          - medium
          - large
          - xlarge
          - 2xlarge
          - 4xlarge
      accessories:
        description: "Accessory VMs (JSON array: [{name, plan, disk_size_gb}])"
        required: false
        default: "[]"
      automatic_reboot:
        description: "Enable automatic reboot after unattended upgrades"
        type: boolean
        default: true
      recover:
        description: "Recover from snapshots (cross-zone disaster recovery)"
        type: boolean
        default: false
      automatic_reboot_time_utc:
        description: "Automatic reboot time in HH:MM UTC"
        required: false
        default: "05:00"
      secret_env_vars:
        description: "App secrets as KEY=VALUE lines (workflow_dispatch only — callers use workflow_call secrets)"
        required: false
        default: ""

  workflow_call:
    inputs:
      env_name:
        type: string
        default: "preview"
      zone:
        type: string
        default: "ZP01"
      web_plan:
        type: string
        default: "small"
      web_disk_size_gb:
        type: number
        default: 20
      workers_replicas:
        type: number
        default: 0
      workers_plan:
        type: string
        default: "small"
      accessories:
        type: string
        default: "[]"
      automatic_reboot:
        type: boolean
        default: true
      recover:
        type: boolean
        default: false
      automatic_reboot_time_utc:
        type: string
        default: "05:00"
    secrets:
      CLOUDSTACK_API_KEY:
        required: true
      CLOUDSTACK_SECRET_KEY:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      SECRET_ENV_VARS:
        required: false
    outputs:
      web_ip:
        description: "Web VM public IP"
        value: ${{ jobs.deploy.outputs.web_ip }}
      worker_ips:
        description: "Worker VM public IPs (JSON array)"
        value: ${{ jobs.deploy.outputs.worker_ips }}
      accessory_ips:
        description: "Accessory VM public IPs (JSON object)"
        value: ${{ jobs.deploy.outputs.accessory_ips }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      web_ip: ${{ steps.outputs.outputs.web_ip }}
      worker_ips: ${{ steps.outputs.outputs.worker_ips }}
      accessory_ips: ${{ steps.outputs.outputs.accessory_ips }}

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Checkout infrastructure scripts
        uses: actions/checkout@v4
        with:
          repository: gmautner/locaweb-cloud-deploy
          path: _infra

      - name: Compute infrastructure cache key
        id: infra-hash
        run: |
          echo '${{ toJSON(inputs) }}' > /tmp/inputs.json
          HASH=$(sha256sum /tmp/inputs.json | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Infrastructure input hash: $HASH"

      - name: Cache infrastructure state
        id: infra-cache
        if: inputs.recover != true
        uses: actions/cache@v4
        with:
          path: /tmp/provision-output.json
          key: infra-${{ github.repository }}-${{ inputs.env_name || 'preview' }}-${{ steps.infra-hash.outputs.hash }}

      - name: Build configuration
        if: steps.infra-cache.outputs.cache-hit != 'true'
        env:
          INPUT_ZONE: ${{ inputs.zone }}
          INPUT_WEB_PLAN: ${{ inputs.web_plan }}
          INPUT_WEB_DISK_SIZE_GB: ${{ inputs.web_disk_size_gb }}
          INPUT_WORKERS_REPLICAS: ${{ inputs.workers_replicas }}
          INPUT_WORKERS_PLAN: ${{ inputs.workers_plan }}
          INPUT_ACCESSORIES: ${{ inputs.accessories }}
          INPUT_RECOVER: ${{ inputs.recover }}
        run: python3 _infra/scripts/build_config.py

      - name: Extract SSH public key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 600 /dev/null /tmp/ssh_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/ssh_key
          ssh-keygen -y -f /tmp/ssh_key > /tmp/ssh_key.pub
          echo "Public key extracted successfully."

      - name: Install and configure CloudMonkey
        if: steps.infra-cache.outputs.cache-hit != 'true'
        env:
          CLOUDSTACK_API_KEY: ${{ secrets.CLOUDSTACK_API_KEY }}
          CLOUDSTACK_SECRET_KEY: ${{ secrets.CLOUDSTACK_SECRET_KEY }}
        run: |
          wget -q https://github.com/apache/cloudstack-cloudmonkey/releases/latest/download/cmk.linux.x86-64
          chmod +x cmk.linux.x86-64
          sudo mv cmk.linux.x86-64 /usr/local/bin/cmk
          cmk set url "https://painel-cloud.locaweb.com.br/client/api"
          cmk set apikey "$CLOUDSTACK_API_KEY"
          cmk set secretkey "$CLOUDSTACK_SECRET_KEY"
          cmk set output json
          cmk sync
          echo "Verifying CloudStack connectivity..."
          cmk list zones filter=name
          echo "CloudMonkey configured successfully."

      - name: Provision infrastructure
        if: steps.infra-cache.outputs.cache-hit != 'true'
        run: |
          recover_flag=""
          if [ "${{ inputs.recover }}" = "true" ]; then
            recover_flag="--recover"
          fi
          python3 -u _infra/scripts/provision_infrastructure.py \
            --repo-name "${{ github.event.repository.name }}" \
            --unique-id "${{ github.repository_id }}" \
            --env-name "${{ inputs.env_name || 'preview' }}" \
            --config /tmp/config.json \
            --public-key /tmp/ssh_key.pub \
            --output /tmp/provision-output.json \
            $recover_flag

      - name: Set outputs
        id: outputs
        run: |
          python3 << 'PYEOF'
          import json, os
          d = json.load(open('/tmp/provision-output.json'))
          accessories = d.get('accessories', {})
          # Build accessory IPs JSON
          acc_ips = {name: data.get('ip', '') for name, data in accessories.items()}
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"web_ip={d.get('web_ip', '')}\n")
              f.write(f"worker_ips={json.dumps(d.get('worker_ips', []))}\n")
              f.write(f"accessory_ips={json.dumps(acc_ips)}\n")
          PYEOF

      - name: Upload provisioning output
        uses: actions/upload-artifact@v4
        with:
          name: provision-output
          path: /tmp/provision-output.json
          retention-days: 90

      - name: Print summary
        run: |
          python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json
          d = json.load(open('/tmp/provision-output.json'))
          print('## Infrastructure Provisioning Complete')
          print('')
          print('| Resource | Public IP |')
          print('|----------|-----------|')
          print(f'| Web | {d.get("web_ip", "N/A")} |')
          for i, ip in enumerate(d.get("worker_ips", []), 1):
              print(f'| Worker {i} | {ip} |')
          for name, data in d.get("accessories", {}).items():
              print(f'| {name} | {data.get("ip", "N/A")} |')
          PYEOF

      - name: Configure unattended upgrades
        if: steps.infra-cache.outputs.cache-hit != 'true'
        run: |
          python3 -u _infra/scripts/configure_unattended_upgrades.py \
            --ssh-key /tmp/ssh_key \
            --provision-output /tmp/provision-output.json \
            --automatic-reboot "${{ inputs.automatic_reboot }}" \
            --reboot-time "${{ inputs.automatic_reboot_time_utc }}"

      - name: Configure gem path
        run: |
          echo "GEM_HOME=$HOME/.gems" >> "$GITHUB_ENV"
          echo "$HOME/.gems/bin" >> "$GITHUB_PATH"

      - name: Cache Kamal gem
        id: kamal-cache
        uses: actions/cache@v4
        with:
          path: ~/.gems
          key: kamal-${{ runner.os }}-v1

      - name: Install Kamal
        if: steps.kamal-cache.outputs.cache-hit != 'true'
        run: gem install kamal --no-document

      - name: Verify Kamal
        run: kamal version

      - name: Prepare SSH key for Kamal
        run: |
          mkdir -p .kamal
          cp /tmp/ssh_key .kamal/ssh_key
          chmod 600 .kamal/ssh_key

      - name: Expose GitHub Actions runtime for Docker cache
        uses: actions/github-script@v7
        with:
          script: |
            const vars = [
              'ACTIONS_CACHE_URL',
              'ACTIONS_RUNTIME_TOKEN',
              'ACTIONS_RUNTIME_URL',
              'ACTIONS_RESULTS_URL',
              'ACTIONS_CACHE_SERVICE_V2',
            ];
            for (const v of vars) {
              const val = process.env[v];
              if (val) core.exportVariable(v, val);
            }

      - name: Deploy with Kamal
        env:
          SECRET_ENV_VARS: ${{ secrets.SECRET_ENV_VARS || inputs.secret_env_vars }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          INFRA_CACHE_HIT: ${{ steps.infra-cache.outputs.cache-hit }}
        run: |
          pip install -q python-dotenv

          # Infrastructure bindings (for Kamal ERB in destination file)
          export INFRA_WEB_IP=$(jq -r .web_ip /tmp/provision-output.json)
          for name in $(jq -r '.accessories | keys[]' /tmp/provision-output.json 2>/dev/null); do
            export "INFRA_${name^^}_IP"=$(jq -r ".accessories.${name}.ip" /tmp/provision-output.json)
          done
          for i in $(seq 0 $(($(jq '.worker_ips | length' /tmp/provision-output.json 2>/dev/null || echo 0) - 1))); do
            export "INFRA_WORKER_IP_${i}"=$(jq -r ".worker_ips[$i]" /tmp/provision-output.json)
          done

          # Export app secrets from SECRET_ENV_VARS using python-dotenv.
          # Values may reference $INFRA_<NAME>_IP variables (resolved above).
          eval "$(python3 << 'PYEOF'
          from dotenv import dotenv_values
          from io import StringIO
          import os, re, shlex
          infra = {k: v for k, v in os.environ.items() if k.startswith('INFRA_')}
          for k, v in dotenv_values(stream=StringIO(os.environ.get('SECRET_ENV_VARS', '')), interpolate=False).items():
              v = re.sub(r'\$([A-Z_]+)', lambda m: infra.get(m.group(1), m.group(0)), v)
              print(f'export {k}={shlex.quote(v)}')
          PYEOF
          )"

          # Repo identity (for Kamal ERB in destination file)
          export REPO_NAME=${{ github.event.repository.name }}
          export REPO_FULL=${{ github.repository }}
          export REPO_OWNER=${{ github.repository_owner }}

          if [ "$INFRA_CACHE_HIT" = "true" ]; then
            echo "Infrastructure cached — running kamal deploy"
            kamal deploy -d ${{ inputs.env_name || 'preview' }}
          else
            echo "Fresh infrastructure — running kamal setup"
            kamal setup -d ${{ inputs.env_name || 'preview' }}
          fi

      - name: Reboot accessories if plan changed
        env:
          SECRET_ENV_VARS: ${{ secrets.SECRET_ENV_VARS || inputs.secret_env_vars }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -q python-dotenv

          # Infrastructure bindings
          export INFRA_WEB_IP=$(jq -r .web_ip /tmp/provision-output.json)
          for name in $(jq -r '.accessories | keys[]' /tmp/provision-output.json 2>/dev/null); do
            export "INFRA_${name^^}_IP"=$(jq -r ".accessories.${name}.ip" /tmp/provision-output.json)
          done
          for i in $(seq 0 $(($(jq '.worker_ips | length' /tmp/provision-output.json 2>/dev/null || echo 0) - 1))); do
            export "INFRA_WORKER_IP_${i}"=$(jq -r ".worker_ips[$i]" /tmp/provision-output.json)
          done

          # Export app secrets (with $INFRA_* substitution)
          eval "$(python3 << 'PYEOF'
          from dotenv import dotenv_values
          from io import StringIO
          import os, re, shlex
          infra = {k: v for k, v in os.environ.items() if k.startswith('INFRA_')}
          for k, v in dotenv_values(stream=StringIO(os.environ.get('SECRET_ENV_VARS', '')), interpolate=False).items():
              v = re.sub(r'\$([A-Z_]+)', lambda m: infra.get(m.group(1), m.group(0)), v)
              print(f'export {k}={shlex.quote(v)}')
          PYEOF
          )"

          export REPO_NAME=${{ github.event.repository.name }}
          export REPO_FULL=${{ github.repository }}
          export REPO_OWNER=${{ github.repository_owner }}

          # Reboot accessories whose VMs were rescaled
          for name in $(jq -r '.accessories | to_entries[] | select(.value.vm_scaled) | .key' /tmp/provision-output.json 2>/dev/null); do
            echo "Accessory '$name' VM was rescaled, rebooting..."
            kamal accessory reboot $name -d ${{ inputs.env_name || 'preview' }}
          done

      - name: Print Kamal deployment summary
        run: |
          python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json, os
          d = json.load(open('/tmp/provision-output.json'))
          web_ip = d.get('web_ip', 'N/A')
          sha = os.environ.get('GITHUB_SHA', 'unknown')[:7]
          repo = os.environ.get('GITHUB_REPOSITORY', '')
          print('')
          print('## Kamal Deployment Complete')
          print('')
          print(f'- **Commit:** `{sha}`')
          print(f'- **Image:** `ghcr.io/{repo}:{sha}`')
          print(f'- **Web IP:** `{web_ip}`')
          print(f'- **TLS:** Let\'s Encrypt (automatic)')
          print('')
          print('The app URL depends on the `proxy.host` in your Kamal config (nip.io or custom domain).')
          PYEOF
