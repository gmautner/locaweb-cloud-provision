# Infrastructure Provisioning Workflow
#
# Provisions CloudStack infrastructure (VMs, networks, disks, IPs, firewall rules)
# and outputs everything the caller needs to deploy with Kamal.
#
# This workflow is infra-only — it does NOT install Kamal, build Docker images,
# or deploy the application. The caller handles application deployment using
# the outputs from this workflow.
#
# Required GitHub Secrets:
#   CLOUDSTACK_API_KEY    - CloudStack API key
#   CLOUDSTACK_SECRET_KEY - CloudStack secret key
#   SSH_PRIVATE_KEY       - SSH private key for VM access

name: Provision

permissions:
  contents: read

concurrency:
  group: infra-${{ github.repository }}-${{ inputs.env_name || 'preview' }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment name (e.g. preview, staging, production)"
        required: false
        default: "preview"
      zone:
        description: "CloudStack zone"
        type: choice
        default: "ZP01"
        options:
          - ZP01
          - ZP02
      web_plan:
        description: "Web VM plan"
        type: choice
        default: "small"
        options:
          - micro
          - small
          - medium
          - large
          - xlarge
          - 2xlarge
          - 4xlarge
      web_disk_size_gb:
        description: "Web data disk size in GB"
        type: number
        default: 20
      workers_replicas:
        description: "Number of worker replicas (0 = no workers)"
        type: number
        default: 0
      workers_plan:
        description: "Worker VM plan"
        type: choice
        default: "small"
        options:
          - micro
          - small
          - medium
          - large
          - xlarge
          - 2xlarge
          - 4xlarge
      accessories:
        description: "Accessory VMs (JSON array: [{name, plan, disk_size_gb, ports?}]). Names must use only lowercase letters, digits, and underscores (e.g. 'wordpress_db', not 'wordpress-db')."
        required: false
        default: "[]"
      automatic_reboot:
        description: "Enable automatic reboot after unattended upgrades"
        type: boolean
        default: true
      recover:
        description: "Recover from snapshots (cross-zone disaster recovery)"
        type: boolean
        default: false
      automatic_reboot_time_utc:
        description: "Automatic reboot time in HH:MM UTC"
        required: false
        default: "05:00"

  workflow_call:
    inputs:
      env_name:
        type: string
        default: "preview"
      zone:
        type: string
        default: "ZP01"
      web_plan:
        type: string
        default: "small"
      web_disk_size_gb:
        type: number
        default: 20
      workers_replicas:
        type: number
        default: 0
      workers_plan:
        type: string
        default: "small"
      accessories:
        type: string
        default: "[]"
      automatic_reboot:
        type: boolean
        default: true
      recover:
        type: boolean
        default: false
      automatic_reboot_time_utc:
        type: string
        default: "05:00"
    secrets:
      CLOUDSTACK_API_KEY:
        required: true
      CLOUDSTACK_SECRET_KEY:
        required: true
      SSH_PRIVATE_KEY:
        required: true
    outputs:
      web_ip:
        description: "Web VM public IP"
        value: ${{ jobs.provision.outputs.web_ip }}
      worker_ips:
        description: "Worker VM public IPs (JSON array)"
        value: ${{ jobs.provision.outputs.worker_ips }}
      accessory_ips:
        description: "Accessory VM public IPs (JSON object)"
        value: ${{ jobs.provision.outputs.accessory_ips }}
      infrastructure_changed:
        description: "true when fresh provision (cache miss), false when cached"
        value: ${{ jobs.provision.outputs.infrastructure_changed }}
      scaled_accessories:
        description: "JSON array of accessory names whose VMs were rescaled"
        value: ${{ jobs.provision.outputs.scaled_accessories }}
      infra_env:
        description: "Multiline KEY=VALUE pairs for GITHUB_ENV (INFRA_WEB_IP, INFRA_<NAME>_IP, INFRA_WORKER_IP_<N>)"
        value: ${{ jobs.provision.outputs.infra_env }}

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      web_ip: ${{ steps.outputs.outputs.web_ip }}
      worker_ips: ${{ steps.outputs.outputs.worker_ips }}
      accessory_ips: ${{ steps.outputs.outputs.accessory_ips }}
      infrastructure_changed: ${{ steps.outputs.outputs.infrastructure_changed }}
      scaled_accessories: ${{ steps.outputs.outputs.scaled_accessories }}
      infra_env: ${{ steps.outputs.outputs.infra_env }}

    steps:
      - name: Checkout infrastructure scripts
        uses: actions/checkout@v5
        with:
          repository: gmautner/locaweb-cloud-provision
          path: _infra

      - name: Compute infrastructure cache key
        id: infra-hash
        run: |
          echo '${{ toJSON(inputs) }}' > /tmp/inputs.json
          HASH=$(sha256sum /tmp/inputs.json | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Infrastructure input hash: $HASH"

      - name: Cache infrastructure state
        id: infra-cache
        if: inputs.recover != true
        uses: actions/cache@v5
        with:
          path: /tmp/provision-output.json
          key: infra-${{ github.repository }}-${{ inputs.env_name || 'preview' }}-${{ steps.infra-hash.outputs.hash }}

      - name: Build configuration
        if: steps.infra-cache.outputs.cache-hit != 'true'
        env:
          INPUT_ZONE: ${{ inputs.zone }}
          INPUT_WEB_PLAN: ${{ inputs.web_plan }}
          INPUT_WEB_DISK_SIZE_GB: ${{ inputs.web_disk_size_gb }}
          INPUT_WORKERS_REPLICAS: ${{ inputs.workers_replicas }}
          INPUT_WORKERS_PLAN: ${{ inputs.workers_plan }}
          INPUT_ACCESSORIES: ${{ inputs.accessories }}
          INPUT_RECOVER: ${{ inputs.recover }}
        run: python3 _infra/scripts/build_config.py

      - name: Extract SSH public key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 600 /dev/null /tmp/ssh_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/ssh_key
          ssh-keygen -y -f /tmp/ssh_key > /tmp/ssh_key.pub
          echo "Public key extracted successfully."

      - name: Install and configure CloudMonkey
        if: steps.infra-cache.outputs.cache-hit != 'true'
        env:
          CLOUDSTACK_API_KEY: ${{ secrets.CLOUDSTACK_API_KEY }}
          CLOUDSTACK_SECRET_KEY: ${{ secrets.CLOUDSTACK_SECRET_KEY }}
        run: |
          wget -q https://github.com/apache/cloudstack-cloudmonkey/releases/latest/download/cmk.linux.x86-64
          chmod +x cmk.linux.x86-64
          sudo mv cmk.linux.x86-64 /usr/local/bin/cmk
          cmk set url "https://painel-cloud.locaweb.com.br/client/api"
          cmk set apikey "$CLOUDSTACK_API_KEY"
          cmk set secretkey "$CLOUDSTACK_SECRET_KEY"
          cmk set output json
          cmk sync
          echo "Verifying CloudStack connectivity..."
          cmk list zones filter=name
          echo "CloudMonkey configured successfully."

      - name: Provision infrastructure
        if: steps.infra-cache.outputs.cache-hit != 'true'
        run: |
          recover_flag=""
          if [ "${{ inputs.recover }}" = "true" ]; then
            recover_flag="--recover"
          fi
          python3 -u _infra/scripts/provision_infrastructure.py \
            --repo-name "${{ github.event.repository.name }}" \
            --unique-id "${{ github.repository_id }}" \
            --env-name "${{ inputs.env_name || 'preview' }}" \
            --config /tmp/config.json \
            --public-key /tmp/ssh_key.pub \
            --output /tmp/provision-output.json \
            $recover_flag

      - name: Set outputs
        id: outputs
        env:
          INFRA_CACHE_HIT: ${{ steps.infra-cache.outputs.cache-hit }}
        run: |
          python3 << 'PYEOF'
          import json, os
          d = json.load(open('/tmp/provision-output.json'))
          accessories = d.get('accessories', {})
          cache_hit = os.environ.get('INFRA_CACHE_HIT', '') == 'true'

          acc_ips = {name: data.get('ip', '') for name, data in accessories.items()}
          scaled = [name for name, data in accessories.items() if data.get('vm_scaled')]

          env_lines = []
          web_ip = d.get('web_ip', '')
          if web_ip:
              env_lines.append(f'INFRA_WEB_IP={web_ip}')
          for name, data in sorted(accessories.items()):
              ip = data.get('ip', '')
              if ip:
                  env_lines.append(f'INFRA_{name.upper()}_IP={ip}')
          for i, ip in enumerate(d.get('worker_ips', [])):
              env_lines.append(f'INFRA_WORKER_IP_{i}={ip}')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"web_ip={web_ip}\n")
              f.write(f"worker_ips={json.dumps(d.get('worker_ips', []))}\n")
              f.write(f"accessory_ips={json.dumps(acc_ips)}\n")
              f.write(f"infrastructure_changed={'false' if cache_hit else 'true'}\n")
              f.write(f"scaled_accessories={json.dumps(scaled)}\n")
              f.write("infra_env<<INFRA_ENV_EOF\n")
              f.write("\n".join(env_lines) + "\n")
              f.write("INFRA_ENV_EOF\n")
          PYEOF

      - name: Upload provisioning output
        uses: actions/upload-artifact@v5
        with:
          name: provision-output
          path: /tmp/provision-output.json
          retention-days: 90

      - name: Print summary
        run: |
          python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json
          d = json.load(open('/tmp/provision-output.json'))
          print('## Infrastructure Provisioning Complete')
          print('')
          print('| Resource | Public IP |')
          print('|----------|-----------|')
          print(f'| Web | {d.get("web_ip", "N/A")} |')
          for i, ip in enumerate(d.get("worker_ips", []), 1):
              print(f'| Worker {i} | {ip} |')
          for name, data in d.get("accessories", {}).items():
              print(f'| {name} | {data.get("ip", "N/A")} |')
          PYEOF

      - name: Configure unattended upgrades
        if: steps.infra-cache.outputs.cache-hit != 'true'
        run: |
          python3 -u _infra/scripts/configure_unattended_upgrades.py \
            --ssh-key /tmp/ssh_key \
            --provision-output /tmp/provision-output.json \
            --automatic-reboot "${{ inputs.automatic_reboot }}" \
            --reboot-time "${{ inputs.automatic_reboot_time_utc }}"
