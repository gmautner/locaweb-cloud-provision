# Deploy Application Workflow
#
# Two-job workflow that provisions infrastructure (via provision.yml) and then
# deploys the application with Kamal. This workflow simulates a caller for
# internal development and E2E testing.
#
# For external callers: use provision.yml directly for infrastructure, then
# handle Kamal deployment in your own workflow job using the outputs.
#
# Required GitHub Secrets:
#   CLOUDSTACK_API_KEY    - CloudStack API key
#   CLOUDSTACK_SECRET_KEY - CloudStack secret key
#   SSH_PRIVATE_KEY       - SSH private key for VM access

name: Deploy App

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment name (e.g. preview, staging, production)"
        required: false
        default: "preview"
      zone:
        description: "CloudStack zone"
        type: choice
        default: "ZP01"
        options:
          - ZP01
          - ZP02
      web_plan:
        description: "Web VM plan"
        type: choice
        default: "small"
        options:
          - micro
          - small
          - medium
          - large
          - xlarge
          - 2xlarge
          - 4xlarge
      web_disk_size_gb:
        description: "Web data disk size in GB"
        type: number
        default: 20
      workers_replicas:
        description: "Number of worker replicas (0 = no workers)"
        type: number
        default: 0
      workers_plan:
        description: "Worker VM plan"
        type: choice
        default: "small"
        options:
          - micro
          - small
          - medium
          - large
          - xlarge
          - 2xlarge
          - 4xlarge
      accessories:
        description: "Accessory VMs (JSON array: [{name, plan, disk_size_gb, ports?}]). Names must use only lowercase letters, digits, and underscores (e.g. 'wordpress_db', not 'wordpress-db')."
        required: false
        default: "[]"
      automatic_reboot:
        description: "Enable automatic reboot after unattended upgrades"
        type: boolean
        default: true
      recover:
        description: "Recover from snapshots (cross-zone disaster recovery)"
        type: boolean
        default: false
      automatic_reboot_time_utc:
        description: "Automatic reboot time in HH:MM UTC"
        required: false
        default: "05:00"
      secret_env_vars:
        description: "App secrets as KEY=VALUE lines (for E2E testing — real callers map secrets directly)"
        required: false
        default: ""

jobs:
  infra:
    uses: ./.github/workflows/provision.yml
    with:
      env_name: ${{ inputs.env_name }}
      zone: ${{ inputs.zone }}
      web_plan: ${{ inputs.web_plan }}
      web_disk_size_gb: ${{ fromJSON(inputs.web_disk_size_gb) }}
      workers_replicas: ${{ fromJSON(inputs.workers_replicas) }}
      workers_plan: ${{ inputs.workers_plan }}
      accessories: ${{ inputs.accessories }}
      automatic_reboot: ${{ fromJSON(inputs.automatic_reboot) }}
      recover: ${{ fromJSON(inputs.recover) }}
      automatic_reboot_time_utc: ${{ inputs.automatic_reboot_time_utc }}
    secrets:
      CLOUDSTACK_API_KEY: ${{ secrets.CLOUDSTACK_API_KEY }}
      CLOUDSTACK_SECRET_KEY: ${{ secrets.CLOUDSTACK_SECRET_KEY }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  deploy:
    needs: infra
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Load infrastructure environment
        run: echo "${{ needs.infra.outputs.infra_env }}" >> "$GITHUB_ENV"

      - name: Set repo identity
        run: |
          echo "REPO_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          echo "REPO_FULL=${{ github.repository }}" >> "$GITHUB_ENV"
          echo "REPO_OWNER=${{ github.repository_owner }}" >> "$GITHUB_ENV"

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Expose GHA cache env vars for Kamal's `docker buildx build --cache-from type=gha`.
      # Recommended by https://docs.docker.com/build/cache/backends/gha/
      - uses: crazy-max/ghaction-github-runtime@v3

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - run: gem install kamal --no-document

      - name: Export application secrets
        env:
          SECRET_ENV_VARS: ${{ inputs.secret_env_vars }}
        run: |
          if [ -n "$SECRET_ENV_VARS" ]; then
            pip install -q python-dotenv
            python3 -c "
          from dotenv import dotenv_values
          from io import StringIO
          import os
          env_file = os.environ['GITHUB_ENV']
          with open(env_file, 'a') as f:
              for k, v in dotenv_values(stream=StringIO(os.environ.get('SECRET_ENV_VARS', ''))).items():
                  f.write(f'{k}={v}\n')
          "
          fi

      - name: Deploy with Kamal
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          kamal setup -d ${{ inputs.env_name || 'preview' }}
          kamal accessory reboot all -d ${{ inputs.env_name || 'preview' }}

      - name: Print Kamal deployment summary
        run: |
          python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import os
          web_ip = os.environ.get('INFRA_WEB_IP', 'N/A')
          sha = os.environ.get('GITHUB_SHA', 'unknown')[:7]
          repo = os.environ.get('GITHUB_REPOSITORY', '')
          print('')
          print('## Kamal Deployment Complete')
          print('')
          print(f'- **Commit:** `{sha}`')
          print(f'- **Image:** `ghcr.io/{repo}:{sha}`')
          print(f'- **Web IP:** `{web_ip}`')
          print(f'- **TLS:** Let\'s Encrypt (automatic)')
          print('')
          print('The app URL depends on the `proxy.host` in your Kamal config (nip.io or custom domain).')
          PYEOF
