service: <%= ENV['REPO_NAME'] %>
image: <%= ENV['REPO_FULL'] %>

servers:
  web:
    hosts:
      - <%= ENV['INFRA_WEB_IP'] %>

proxy:
  host: <%= ENV['INFRA_WEB_IP'] %>.nip.io
  ssl: false

ssh:
  user: root

registry:
  server: ghcr.io
  username: <%= ENV['REPO_OWNER'] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    BLOB_STORAGE_PATH: /data/blobs
    MY_VAR: hello-from-e2e
  secret:
    - MY_SECRET

builder:
  arch: amd64
  cache:
    type: gha
    options: mode=max
